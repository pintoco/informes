version: '3.8'

# ============================================================
# Elemental Pro — Stack 100% local (sin AWS)
# MinIO = S3 | Redis+BullMQ = SQS | JWT local = Cognito
# Uso: docker compose -f docker-compose.local.yml up --build
# ============================================================

services:

  db:
    image: postgres:15-alpine
    container_name: elemental_db_local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elemental_pro
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elemental_pro"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - elemental_local

  minio:
    image: minio/minio:latest
    container_name: elemental_minio
    restart: unless-stopped
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # Console web → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elemental_local

  minio-init:
    image: minio/mc:latest
    container_name: elemental_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://minioadmin:minioadmin123@minio:9000
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/elemental-photos &&
        mc mb --ignore-existing local/elemental-pdfs &&
        mc anonymous set download local/elemental-pdfs &&
        echo 'MinIO buckets ready'
      "
    networks:
      - elemental_local

  redis:
    image: redis:7-alpine
    container_name: elemental_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - elemental_local

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: elemental_migrate_local
    command: npx prisma db push --accept-data-loss
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/elemental_pro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - elemental_local

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: elemental_backend_local
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/elemental_pro
      # Auth local
      LOCAL_AUTH: "true"
      JWT_SECRET: local-dev-secret-please-change-in-production
      JWT_EXPIRES_IN: 7d
      # MinIO como S3
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9002
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_PHOTOS: elemental-photos
      S3_BUCKET_PDFS: elemental-pdfs
      # Redis como cola
      REDIS_URL: redis://redis:6379
      # CORS
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - elemental_local

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: elemental_frontend_local
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      BACKEND_URL: http://backend:3001
      VITE_API_URL: /api
      VITE_AUTH_MODE: local
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
    depends_on:
      - backend
    networks:
      - elemental_local

volumes:
  postgres_data_local:
  minio_data:
  redis_data:

networks:
  elemental_local:
    driver: bridge
