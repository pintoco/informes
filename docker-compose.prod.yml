version: '3.8'

# ============================================================
# Elemental Pro — Producción con HTTPS (Let's Encrypt)
# Uso:
#   1. Editar .env.prod con tu dominio y claves
#   2. Ejecutar: bash scripts/setup-ssl.sh
#   3. Luego: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
# ============================================================

services:

  db:
    image: postgres:15-alpine
    container_name: elemental_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-elemental_pro}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-elemental_pro}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - elemental_prod

  minio:
    image: minio/minio:latest
    container_name: elemental_minio_prod
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data_prod:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elemental_prod

  minio-init:
    image: minio/mc:latest
    container_name: elemental_minio_init_prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin123} &&
        mc mb --ignore-existing local/elemental-photos &&
        mc mb --ignore-existing local/elemental-pdfs &&
        mc anonymous set download local/elemental-photos &&
        mc anonymous set download local/elemental-pdfs &&
        echo 'MinIO listo'
      "
    networks:
      - elemental_prod

  redis:
    image: redis:7-alpine
    container_name: elemental_redis_prod
    restart: unless-stopped
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - elemental_prod

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elemental_migrate_prod
    command: npx prisma db push --accept-data-loss
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-elemental_pro}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - elemental_prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elemental_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-elemental_pro}
      LOCAL_AUTH: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin123}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_URL:-https://${DOMAIN}:7443}
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET_PHOTOS: elemental-photos
      S3_BUCKET_PDFS: elemental-pdfs
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: https://${DOMAIN}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - elemental_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_AUTH_MODE: local
    container_name: elemental_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - elemental_prod

  nginx:
    image: nginx:1.25-alpine
    container_name: elemental_nginx_prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx-ssl/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx-ssl/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - elemental_prod

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: elemental_certbot_prod
    volumes:
      - ./nginx-ssl/certbot/conf:/etc/letsencrypt
      - ./nginx-ssl/cloudflare.ini:/cloudflare.ini:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --dns-cloudflare --dns-cloudflare-credentials /cloudflare.ini; sleep 12h & wait $${!}; done;'"
    networks:
      - elemental_prod

volumes:
  postgres_data_prod:
  minio_data_prod:
  redis_data_prod:

networks:
  elemental_prod:
    driver: bridge
