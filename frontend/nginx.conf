server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache assets estáticos compilados por Vite (tienen hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — todas las rutas sirven index.html
    # En Railway/producción la API se llama directamente desde el browser
    # usando VITE_API_URL bakeado en el build
    location / {
        try_files $uri $uri/ /index.html;
    }
}
