# ── HTTP: redirect a HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name elementalpro.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name elementalpro.net;

    ssl_certificate     /etc/letsencrypt/live/elementalpro.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elementalpro.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Resolver DNS de Docker para resolución dinámica de hostnames
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API Backend ──────────────────────────────────────────────────────────
    location /api/ {
        set $upstream_backend http://backend:3001;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── MinIO: fotos ─────────────────────────────────────────────────────────
    location /elemental-photos/ {
        proxy_pass            http://minio:9000/elemental-photos/;
        proxy_set_header      Host $http_host;
        proxy_hide_header     x-amz-id-2;
        proxy_hide_header     x-amz-request-id;
        client_max_body_size  20M;
    }

    # ── MinIO: PDFs ──────────────────────────────────────────────────────────
    location /elemental-pdfs/ {
        proxy_pass            http://minio:9000/elemental-pdfs/;
        proxy_set_header      Host $http_host;
        proxy_hide_header     x-amz-id-2;
        proxy_hide_header     x-amz-request-id;
        proxy_hide_header     Content-Disposition;
        proxy_buffering       off;
        add_header            Content-Disposition 'inline';
    }

    # ── Frontend (SPA) ───────────────────────────────────────────────────────
    location / {
        set $upstream_frontend http://frontend:80;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
